services:
  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  fluent-bit:
    image: fluent/fluent-bit:4.0
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/webhook.lua:/fluent-bit/etc/webhook.lua:ro
      - ${APP_LOG:-/tmp/threadly.log}:/var/log/threadly.log:ro
      - ${PAYMENTS_LOG:-/tmp/payments.log}:/var/log/payments.log:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEMO_HOST=${DEMO_HOST:-thor}

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      loki:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  loki-data:
  grafana-data:
