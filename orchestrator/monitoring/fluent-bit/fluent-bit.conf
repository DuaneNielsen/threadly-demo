[SERVICE]
    Flush           1
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf

[INPUT]
    Name            tail
    Tag             threadly
    Path            /var/log/host-tmp/threadly.log
    # Persist tail offset across restarts so old ERRORs aren't re-replayed
    # (memory-only storage + Read_from_Head=true caused webhook storms).
    DB              /var/log/fluent-bit/threadly.db
    Read_from_Head  true
    Refresh_Interval 2
    inotify_watcher false
    Multiline       On
    Parser_Firstline springboot_firstline
    Skip_Empty_Lines On

[INPUT]
    Name            tail
    Tag             payments
    Path            /var/log/host-tmp/payments.log
    DB              /var/log/fluent-bit/payments.db
    Read_from_Head  true
    Refresh_Interval 2
    inotify_watcher false
    Multiline       On
    Parser_Firstline springboot_firstline
    Skip_Empty_Lines On

# Clone ERROR lines to *_error tag — keep original (true)
[FILTER]
    Name            rewrite_tag
    Match           threadly
    Rule            $level ^(ERROR)$ threadly_error true
    Emitter_Name    threadly_error_emitter

[FILTER]
    Name            rewrite_tag
    Match           payments
    Rule            $level ^(ERROR)$ payments_error true
    Emitter_Name    payments_error_emitter

# ALL logs to Loki
[OUTPUT]
    Name            loki
    Match           threadly
    Host            loki
    Port            3100
    Labels          job=threadly, app=threadly
    Label_Keys      $level
    Auto_Kubernetes_Labels off

[OUTPUT]
    Name            loki
    Match           payments
    Host            loki
    Port            3100
    Labels          job=payments, app=payments
    Label_Keys      $level
    Auto_Kubernetes_Labels off

# Transform ERROR records into webhook payload
[FILTER]
    Name            lua
    Match           threadly_error
    Script          /fluent-bit/etc/webhook.lua
    Call            to_webhook_payload

[FILTER]
    Name            lua
    Match           payments_error
    Script          /fluent-bit/etc/webhook.lua
    Call            to_webhook_payload_payments

# ERROR-only webhooks to demo server
[OUTPUT]
    Name            http
    Match           threadly_error
    Host            host.docker.internal
    Port            5000
    URI             /webhook
    Format          json
    Header          Content-Type application/json
    Json_date_key   false

[OUTPUT]
    Name            http
    Match           payments_error
    Host            host.docker.internal
    Port            5000
    URI             /webhook
    Format          json
    Header          Content-Type application/json
    Json_date_key   false
