[SERVICE]
    Flush           1
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf

[INPUT]
    Name            tail
    Tag             petclinic
    Path            /var/log/petclinic.log
    Read_from_Head  true
    Refresh_Interval 2
    inotify_watcher false
    Multiline       On
    Parser_Firstline springboot_firstline
    Skip_Empty_Lines On

# Clone ERROR lines to petclinic_error tag — keep original (true)
[FILTER]
    Name            rewrite_tag
    Match           petclinic
    Rule            $level ^(ERROR)$ petclinic_error true
    Emitter_Name    error_emitter

# ALL logs to Loki
[OUTPUT]
    Name            loki
    Match           petclinic
    Host            loki
    Port            3100
    Labels          job=petclinic, app=spring-petclinic
    Label_Keys      $level
    Auto_Kubernetes_Labels off

# Transform ERROR records into webhook payload
[FILTER]
    Name            lua
    Match           petclinic_error
    Script          /fluent-bit/etc/webhook.lua
    Call            to_webhook_payload

# ERROR-only webhook to demo server
[OUTPUT]
    Name            http
    Match           petclinic_error
    Host            host.docker.internal
    Port            5000
    URI             /webhook
    Format          json
    Header          Content-Type application/json
    Json_date_key   false
