services:
  postgres:
    image: postgres:16-alpine
    container_name: threadly-postgres
    environment:
      POSTGRES_DB: threadly
      POSTGRES_USER: threadly
      POSTGRES_PASSWORD: threadly
    ports:
      - "5432:5432"
    volumes:
      - threadly-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threadly -d threadly"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  threadly-pgdata:
