spring.application.name=threadly
server.port=${APP_PORT:8180}

# Datasource - Postgres (default)
spring.datasource.url=jdbc:postgresql://localhost:5432/threadly
spring.datasource.username=threadly
spring.datasource.password=threadly
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
