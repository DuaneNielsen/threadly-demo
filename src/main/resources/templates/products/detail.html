<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(${product.name} + ' - Threadly')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="wrap detail">
    <div class="detail-grid">
        <div class="detail-img">
            <img th:src="@{${product.imageUrl}}" th:alt="${product.name}"/>
            <span class="card-img-label" th:text="${product.category}">tees</span>
        </div>
        <div class="detail-info">
            <h1 th:text="${product.name}">Product Name</h1>
            <p class="detail-desc" th:text="${product.description}">Description</p>
            <div class="detail-meta">
                <span>Color: <strong th:text="${product.color}">color</strong></span>
                <span>Size: <strong th:text="${product.size}">size</strong></span>
                <span>In stock: <strong th:text="${product.stock}">0</strong></span>
            </div>
            <div class="detail-price">
                <span class="price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$24.00</span>
                <span class="price-original"
                      th:if="${product.originalPrice != null and product.originalPrice.compareTo(product.price) > 0}"
                      th:text="'$' + ${#numbers.formatDecimal(product.originalPrice, 1, 2)}">$30.00</span>
                <span class="price-percent"
                      th:if="${percentOff != null and percentOff.signum() > 0}"
                      th:text="${percentOff} + '% off'">20% off</span>
            </div>
            <form method="post" th:action="@{/cart/add/{id}(id=${product.id})}">
                <button type="submit" class="btn-primary">Add to cart</button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
